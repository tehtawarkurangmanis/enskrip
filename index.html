<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enskrip Deskript Teks</title>

<style>

body {
  background:#0f1724;
  color:#e6eef6;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.container {
  background:#1c2a3e;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  width:90%;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
  text-align:center;
  position:relative;
}

/* LOGO */
.logo {
  width:120px;
  margin-bottom:10px;
  filter: drop-shadow(0 0 10px rgba(0,183,255,0.4));
}

/* Tombol keluar */
.exit-btn {
  position:absolute;
  top:10px;
  right:10px;
  width:auto;
  height:auto;
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#ef4444;
  color:white;
  font-size:14px;
  font-weight:bold;
  cursor:pointer;
}

.exit-btn:hover {
  background:#ff5c5c;
}

textarea, input {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  resize:vertical;
  background:#0b1627;
  color:#fff;
  box-sizing:border-box;
}

button {
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#06b6d4;
  color:#042026;
  font-weight:bold;
  cursor:pointer;
  width:100%;
}

button:hover {
  background:#09d0f1;
}

h1 {
  text-align:center;
  font-size:20px;
  margin-bottom:10px;
}

footer {
  text-align:center;
  margin-top:12px;
  font-size:12px;
  color:#9ca3af;
}

</style>
</head>
<body>

<div class="container">

  <!-- Tombol Keluar -->
  <button class="exit-btn" onclick="confirmExit()">KELUAR</button>

  <!-- LOGO -->
  <img src="logo.png" alt="TON X Logo" class="logo">

  <h1>Enskrip / Deskript</h1>

  <label>Teks:</label>
  <textarea id="text" rows="5" placeholder="Masukkan teks..."></textarea>

  <label>Password:</label>
  <input type="password" id="key" placeholder="Masukkan password">

  <button onclick="encryptText()">🔐 Enkripsi</button>
  <button onclick="decryptText()">🔓 Dekripsi</button>

  <label>Hasil:</label>
  <textarea id="result" rows="5" readonly></textarea>

  <footer>powered by ton-x cryptoiz 2025 ™</footer>
</div>

<script>

// Popup konfirmasi keluar
function confirmExit() {
  let keluar = confirm("Yakin ingin keluar aplikasi?");
  
  if (keluar) {
    window.close();

    // fallback jika tidak didukung webview
    window.location.href = "about:blank";
  }
}

// Enkripsi
function encryptText() {
  const text = document.getElementById("text").value;
  const key = document.getElementById("key").value;

  if (!text || !key)
    return alert("Isi teks dan password dulu!");

  let shift = key.length % 26;
  let encrypted = "";

  for (let i = 0; i < text.length; i++) {
    encrypted += String.fromCharCode(
      text.charCodeAt(i) + shift
    );
  }

  document.getElementById("result").value = btoa(encrypted);
}

// Dekripsi
function decryptText() {
  const text = document.getElementById("text").value;
  const key = document.getElementById("key").value;

  if (!text || !key)
    return alert("Isi teks dan password dulu!");

  let shift = key.length % 26;
  let decoded;

  try {
    decoded = atob(text);
  } catch (e) {
    return alert("Data bukan format enkripsi yang valid!");
  }

  let decrypted = "";

  for (let i = 0; i < decoded.length; i++) {
    decrypted += String.fromCharCode(
      decoded.charCodeAt(i) - shift
    );
  }

  document.getElementById("result").value = decrypted;
}

</script>
</body>
</html>
